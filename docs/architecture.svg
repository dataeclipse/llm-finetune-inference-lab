  <rect x="252" y="512" width="140" height="48" rx="9" fill="#161b22" stroke="#e3b341" stroke-width="1.4"/>
  <text x="322" y="534" fill="#e6edf3" font-size="13" text-anchor="middle">AWQ 4-bit</text>
  <text x="322" y="549" fill="#7d8590" font-size="10.5" text-anchor="middle">GPU serving</text>
  <rect x="252" y="600" width="140" height="48" rx="9" fill="#161b22" stroke="#e3b341" stroke-width="1.4"/>
  <text x="322" y="622" fill="#e6edf3" font-size="13" text-anchor="middle">GGUF Q4_K_M</text>
  <text x="322" y="637" fill="#7d8590" font-size="10.5" text-anchor="middle">CPU / laptop</text>

  <path d="M192,570 L222,570 L222,536 L246,536" fill="none" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>
  <path d="M192,582 L222,582 L222,624 L246,624" fill="none" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- vLLM -->
  <rect x="452" y="556" width="160" height="52" rx="9" fill="#161b22" stroke="#ff9b72" stroke-width="1.4"/>
  <text x="532" y="580" fill="#e6edf3" font-size="13" text-anchor="middle">vLLM</text>
  <text x="532" y="596" fill="#7d8590" font-size="11" text-anchor="middle">OpenAI API · paged attn</text>
  <line x1="392" y1="536" x2="428" y2="536" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>
  <path d="M392,536 L432,536 L432,576 L448,576" fill="none" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Bench / UI -->
  <rect x="672" y="512" width="180" height="48" rx="9" fill="#161b22" stroke="#f778ba" stroke-width="1.4"/>
  <text x="762" y="534" fill="#e6edf3" font-size="13" text-anchor="middle">Bench</text>
  <text x="762" y="549" fill="#7d8590" font-size="10.5" text-anchor="middle">p50 0.45s · 407 tok/s</text>
  <rect x="672" y="600" width="180" height="48" rx="9" fill="#161b22" stroke="#f778ba" stroke-width="1.4"/>
  <text x="762" y="628" fill="#e6edf3" font-size="13" text-anchor="middle">Gradio UI</text>

  <path d="M612,576 L642,576 L642,536 L666,536" fill="none" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>
  <path d="M612,582 L642,582 L642,624 L666,624" fill="none" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- orchestration note -->
  <rect x="912" y="512" width="240" height="136" rx="10" fill="#0f1320" stroke="#30363d"/>
  <text x="932" y="536" fill="#7d8590" font-size="11" font-weight="700" letter-spacing="1">ORCHESTRATION</text>
  <text x="932" y="562" fill="#adbac7" font-size="12">Hydra profiles</text>
  <text x="932" y="582" fill="#7d8590" font-size="11">colab_a100 / cpu_smoke</text>
  <text x="932" y="606" fill="#adbac7" font-size="12">Typer CLI · Prefect flow</text>
  <text x="932" y="628" fill="#adbac7" font-size="12">W&amp;B · FSDP / ZeRO-3</text>

  <!-- Legend -->
  <g font-size="11" fill="#7d8590">
    <circle cx="52" cy="742" r="5" fill="none" stroke="#58a6ff" stroke-width="1.4"/><text x="64" y="746">data</text>
    <circle cx="128" cy="742" r="5" fill="none" stroke="#bc8cff" stroke-width="1.4"/><text x="140" y="746">training</text>
    <circle cx="220" cy="742" r="5" fill="none" stroke="#56d364" stroke-width="1.4"/><text x="232" y="746">eval</text>
    <circle cx="300" cy="742" r="5" fill="none" stroke="#e3b341" stroke-width="1.4"/><text x="312" y="746">quantize</text>
    <circle cx="398" cy="742" r="5" fill="none" stroke="#ff9b72" stroke-width="1.4"/><text x="410" y="746">serving</text>
    <circle cx="486" cy="742" r="5" fill="none" stroke="#f778ba" stroke-width="1.4"/><text x="498" y="746">bench / ui</text>
    <circle cx="586" cy="742" r="5" fill="none" stroke="#768390" stroke-width="1.4"/><text x="598" y="746">storage</text>
