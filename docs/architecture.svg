  <g>
    <path d="M726,286 a44,8 0 0 1 88,0 v22 a44,8 0 0 1 -88,0 z" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <ellipse cx="770" cy="286" rx="44" ry="8" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <text x="770" y="304" fill="#e6edf3" font-size="11.5" text-anchor="middle">Drive · adapters</text>
  </g>
  <path d="M619,240 L619,294 L724,294" fill="none" stroke="#6e7681" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arw)"/>
  <path d="M913,240 L913,294 L816,294" fill="none" stroke="#6e7681" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arw)"/>
  <text x="770" y="330" fill="#7d8590" font-size="10" text-anchor="middle">resumable checkpoints</text>

