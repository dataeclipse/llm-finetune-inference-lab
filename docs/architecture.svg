  <rect x="1046" y="188" width="120" height="52" rx="9" fill="#161b22" stroke="#56d364" stroke-width="1.4"/>
  <text x="1106" y="208" fill="#e6edf3" font-size="13" text-anchor="middle">Eval</text>
  <text x="1106" y="223" fill="#7d8590" font-size="10.5" text-anchor="middle">exec accuracy</text>
  <text x="1106" y="235" fill="#7d8590" font-size="10.5" text-anchor="middle">SQLite</text>
  <line x1="1016" y1="214" x2="1040" y2="214" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- results callout -->
  <rect x="546" y="356" width="620" height="46" rx="9" fill="#0f1a12" stroke="#2ea043" stroke-width="1.2"/>
  <text x="566" y="384" fill="#56d364" font-size="12" font-weight="600">Result:</text>
  <text x="620" y="384" fill="#adbac7" font-size="12">base overall 0.075  →  +SFT 0.535  (7×) · valid-SQL 0.115 → 0.930 · DPO = SFT (honest)</text>

  <!-- ===================== SERVE PANEL ===================== -->
  <rect x="32" y="446" width="1156" height="316" rx="12" fill="#12171f" stroke="#21262d"/>
  <text x="52" y="472" fill="#58a6ff" font-size="12" font-weight="700" letter-spacing="1.5">EXPORT  &amp;  SERVE</text>

  <rect x="52" y="556" width="140" height="52" rx="9" fill="#161b22" stroke="#bc8cff" stroke-width="1.4"/>
  <text x="122" y="580" fill="#e6edf3" font-size="13" text-anchor="middle">Merge LoRA</text>
  <text x="122" y="596" fill="#7d8590" font-size="11" text-anchor="middle">→ fp16</text>

