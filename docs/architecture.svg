<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 792" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6e7681"/>
    </marker>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0d13"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1220" height="792" rx="16" fill="url(#canvas)"/>
  <rect x="0.5" y="0.5" width="1219" height="791" rx="16" fill="none" stroke="#21262d"/>

  <text x="40" y="46" fill="#e6edf3" font-size="20" font-weight="700">llm-finetune-inference-lab</text>
  <text x="40" y="68" fill="#7d8590" font-size="13">Text-to-SQL · QLoRA SFT + DPO · execution-accuracy eval · AWQ/GGUF export · vLLM serving</text>

  <!-- ===================== TRAIN PANEL ===================== -->
  <rect x="32" y="92" width="1156" height="330" rx="12" fill="#12171f" stroke="#21262d"/>
  <text x="52" y="118" fill="#58a6ff" font-size="12" font-weight="700" letter-spacing="1.5">DATA  →  TRAIN  →  EVAL</text>

  <!-- Data -->
  <rect x="52" y="188" width="140" height="52" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
  <text x="122" y="212" fill="#e6edf3" font-size="13" text-anchor="middle">Dataset</text>
  <text x="122" y="228" fill="#7d8590" font-size="11" text-anchor="middle">gretelai t2sql</text>
  <rect x="222" y="188" width="130" height="52" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
  <text x="287" y="212" fill="#e6edf3" font-size="13" text-anchor="middle">Clean</text>
  <text x="287" y="228" fill="#7d8590" font-size="11" text-anchor="middle">sqlglot · dedup</text>
  <rect x="382" y="188" width="130" height="52" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
  <text x="447" y="212" fill="#e6edf3" font-size="13" text-anchor="middle">Split</text>
  <text x="447" y="228" fill="#7d8590" font-size="11" text-anchor="middle">train/val/test</text>

  <line x1="192" y1="214" x2="216" y2="214" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="352" y1="214" x2="376" y2="214" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- Training cluster -->
  <rect x="546" y="140" width="470" height="200" rx="11" fill="#0f1320" stroke="#30363d" stroke-dasharray="4 4"/>
  <text x="564" y="162" fill="#bc8cff" font-size="11" font-weight="700" letter-spacing="1">Training · A100 40GB · QLoRA 4-bit NF4</text>
  <line x1="512" y1="214" x2="562" y2="214" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>

  <rect x="566" y="188" width="106" height="52" rx="9" fill="#161b22" stroke="#bc8cff" stroke-width="1.4"/>
  <text x="619" y="212" fill="#e6edf3" font-size="13" text-anchor="middle">SFT</text>
  <text x="619" y="228" fill="#7d8590" font-size="11" text-anchor="middle">TRL</text>
  <rect x="702" y="188" width="128" height="52" rx="9" fill="#161b22" stroke="#bc8cff" stroke-width="1.4"/>
  <text x="766" y="212" fill="#e6edf3" font-size="13" text-anchor="middle">Pair mining</text>
  <text x="766" y="228" fill="#7d8590" font-size="11" text-anchor="middle">exec failures</text>
  <rect x="860" y="188" width="106" height="52" rx="9" fill="#161b22" stroke="#bc8cff" stroke-width="1.4"/>
  <text x="913" y="212" fill="#e6edf3" font-size="13" text-anchor="middle">DPO</text>
  <text x="913" y="228" fill="#7d8590" font-size="11" text-anchor="middle">preference</text>

